<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KHB Snapshot Viewer</title>
    <link rel="stylesheet" href="../css/admin-vertical.css" />
    <link rel="stylesheet" href="../css/snapshot-viewer.css" />
</head>
<body>

    <div id="inputContainer">
        <div class="input-card">
            <h1>スナップショット JSON ビューワー</h1>
            <p class="input-card-description">保存されたJSONを貼り付けて、OBS用スコアボードを復元表示します。</p>

            <textarea id="jsonInput" class="snapshot-json-input" placeholder='Paste JSON here... {"bout": ...}'></textarea>

            <div class="team-inputs">
                <input type="text" id="redTeamInput" placeholder="紅チーム名 (任意)">
                <input type="text" id="whiteTeamInput" placeholder="白チーム名 (任意)">
            </div>

            <button id="renderBtn" class="snapshot-render-button">表示 (Render)</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <div id="mainCard" class="card snapshot-main-card">
        <div id="scoreboardContainer" class="scoreboard-wrapper snapshot-scoreboard-wrapper">
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/scoreboard.js"></script>
    <script src="../js/scoreboard-vertical.js"></script>
    <script src="../js/snapshot-viewer.js"></script>
</body>

</html>
