<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>会場・連携設定 - KHB Admin</title>
  <link rel="stylesheet" href="../css/admin-venues.css" />
</head>
<body>
  <a class="back-link" href="admin.html">&larr; 管理画面に戻る</a>
  <h1>会場・連携設定</h1>

  <div class="venues-layout-grid">
    <div class="venues-layout-left">
      <div class="card">
        <div class="card-header-row">
          <h2 class="card-header">KHB-Kuawase 連携トークン</h2>
          <button id="btnRefreshKuawaseTokens" class="btn-blue">一覧を更新</button>
        </div>
        <div class="row mb-8">
          <div>
            <label for="kuawaseVenueSelect">会場</label>
            <select id="kuawaseVenueSelect" class="input-md"></select>
          </div>
          <div>
            <label for="kuawaseTokenLabel">ラベル (任意)</label>
            <input id="kuawaseTokenLabel" placeholder="例: 本部PC" class="input-md" />
          </div>
          <div>
            <label for="kuawaseExpiresHours">有効期限 (時間)</label>
            <input id="kuawaseExpiresHours" type="number" min="1" max="336" value="48" class="input-md" style="width:100px" />
          </div>
          <div><label>&nbsp;</label><button id="btnIssueKuawaseToken" class="btn-green">発行</button></div>
        </div>
        <div class="msg" id="kuawaseIssueMsg"></div>
        <div id="kuawaseIssuedTokenBox"></div>

        <div class="msg" id="kuawaseTokenListMsg"></div>
        <table>
          <thead>
            <tr><th>末尾4桁</th><th>ラベル</th><th>会場</th><th>期限</th><th>最終接続</th><th>端末</th><th>状態</th><th>操作</th></tr>
          </thead>
          <tbody id="kuawaseTokenListBody"></tbody>
        </table>
      </div>
    </div>

    <div class="venues-layout-right">
      <div class="card">
        <div class="row">
          <div>
            <label for="adminSecret">管理用シークレット</label>
            <input id="adminSecret" type="password" placeholder="ADMIN_SETUP_SECRET" class="input-lg" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="card-header">会場作成・変更</h2>
        <div class="row mb-8">
          <div><label for="newVenueCode">会場コード</label><input id="newVenueCode" placeholder="例: main" class="input-md" /></div>
          <div><label for="newVenueName">会場名</label><input id="newVenueName" placeholder="例: メイン会場" class="input-md" /></div>
          <div><label>&nbsp;</label><button id="btnSaveVenue" class="btn-green">会場を保存</button></div>
        </div>
        <div class="msg" id="venueMsg"></div>
      </div>

      <div class="card">
        <div class="card-header-row">
          <h2 class="card-header">会場一覧</h2>
          <button id="btnRefreshVenues" class="btn-blue">一覧を更新</button>
        </div>
        <div class="msg" id="venueListMsg"></div>
        <table>
          <thead>
            <tr><th>会場コード</th><th>会場名</th><th>操作</th></tr>
          </thead>
          <tbody id="venueListBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/admin-secret-store.js"></script>
  <script src="../js/admin-venues.js"></script>
  <script src="../js/admin-kuawase-tokens.js"></script>
</body>
</html>
