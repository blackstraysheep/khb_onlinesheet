<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KHB-Kuawase Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <h1>KHB-Kuawase Admin Panel</h1>
  <div style="margin-bottom:12px; display:flex; gap:12px;">
    <a href="admin-match.html" style="color:#3a86ff; font-size:0.9rem;">試合管理</a>
    <a href="admin-judges.html" style="color:#3a86ff; font-size:0.9rem;">審査員管理</a>
  </div>

  <div class="layout-grid">
    <div class="layout-left">
      <!-- state のサマリ -->
      <section class="card fixed-width">
        <div class="state-summary" id="stateSummary">
          <span class="small">未読み込み</span>
        </div>
      </section>

      <!-- スコアボード -->
      <section class="card fixed-width">
        <div class="control-group mb-8">
          <button id="scoreboardModeBtn" class="small-btn btn-blue-grey">縦型に切替</button>
        </div>
        <div class="scoreboard-wrapper">
          <div id="scoreboardContainer" class="scoreboard">
            <!-- JS でスコアボードを描画 -->
          </div>
        </div>
      </section>
    </div>

    <div class="layout-right">
      <!-- 認証 -->
      <section class="card">
        <div class="row">
          <div>
            <label for="adminSecret">管理用シークレット</label>
            <input id="adminSecret" type="password" placeholder="ADMIN_SETUP_SECRET" />
          </div>
        </div>
      </section>

      <!-- 会場・試合選択 -->
      <section class="card">
        <div class="row">
          <div>
            <label for="venueSelect">会場</label>
            <select id="venueSelect"><option value="">-- 読込中 --</option></select>
          </div>
          <div>
            <label for="matchSelect">試合</label>
            <select id="matchSelect"><option value="">-- 会場を選択 --</option></select>
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button id="btnStartMatch" class="small-btn btn-blue-grey">この試合を開始</button>
          </div>
        </div>
        <div class="msg" id="topMsg"></div>
      </section>

      <!-- 受付・確定操作 -->
      <section class="card">
        <div class="control-group">
          <button id="toggleAcceptingBtn" class="small-btn">受付状態を確認中…</button>
          <button id="btnE5" class="small-btn btn-red">E5 確定（スナップショット保存＆受付停止）</button>
          <button id="btnE6" class="small-btn btn-green">E6 次の対戦へ（epoch+1 &amp; 受付再開）</button>
        </div>
        <div class="msg" id="e5e6Status"></div>
      </section>

      <!-- 審査員の並び替え -->
      <section class="card">
        <h2 class="card-header small">審査員の並び替え</h2>
        <div id="judgeReorderList" class="judge-select-list">
          <div class="small" style="color:#aaa;">(試合を選択してください)</div>
        </div>
        <div class="control-group">
          <button id="btnSaveJudgeOrder" class="small-btn btn-green">並び順を保存</button>
        </div>
        <div class="msg" id="judgeReorderStatus"></div>
      </section>

      <!-- 得点読み上げパネル（Zundamon） -->
      <section class="card">
        <h2 class="card-header">得点読み上げパネル（Zundamon）</h2>
        <div class="small" id="audioStatus">
          E3未到達のため、得点読み上げはまだ準備されていません。
        </div>
        <div id="zundaQueueList" class="small zunda-queue-list">
          <!-- 再生キュー表示用 -->
        </div>
        <div class="control-group">
          <button id="btnAudioPlayAll" class="small-btn">開始〜終了 全員読み上げ</button>
          <button id="btnAudioStop" class="small-btn btn-grey">停止</button>
        </div>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scoreboard.js"></script>
  <script src="admin.js"></script>

</body>

</html>
